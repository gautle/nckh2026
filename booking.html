<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Đặt trải nghiệm</title>
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="container top-inner">
      <a class="brand" href="index.html">
        <div class="logo"></div>
        <div>
          <b>Đặt trải nghiệm</b>
          <span>MVP form cho demo</span>
        </div>
      </a>
      <nav class="nav">
        <a href="index.html">Trang chủ</a>
        <a href="map.html">Bản đồ</a>
        <a class="active" href="booking.html">Đặt trải nghiệm</a>
      </nav>
    </div>
  </header>

  <main class="container main">
    <section class="card form">
      <h2 style="margin:0">Form đặt lịch</h2>
      <p id="bookingHint" class="lead">Chọn điểm trải nghiệm và điền thông tin bên dưới.</p>

      <form id="bookingForm" class="form">
        <div class="form-grid">
          <label>Họ tên
            <input class="input" required name="name" />
          </label>
          <label>Số điện thoại
            <input class="input" required name="phone" />
          </label>
          <label>Số người
            <input class="input" type="number" min="1" max="30" required name="people" />
          </label>
          <label>Ngày đi
            <input class="input" type="date" required name="date" />
          </label>
        </div>

        <div class="form-grid">
          <label>Điểm / hoạt động
            <input class="input" id="bookingPointName" name="point_name" readonly />
            <input type="hidden" id="bookingPoint" name="point" />
          </label>
          <label>Gói trải nghiệm
            <select class="input" name="package">
              <option>Gói 1 - Làm thử 1 công đoạn (60')</option>
              <option>Gói 2 - Từ nguyên liệu đến hoạ tiết (120')</option>
              <option>Gói 3 - Combo nghề + ẩm thực + kể chuyện (nửa ngày)</option>
            </select>
          </label>
        </div>

        <label>Ghi chú
          <textarea class="input" name="note" placeholder="Nhu cầu đặc biệt, nhóm có trẻ em/người cao tuổi..."></textarea>
        </label>

        <div class="row" style="justify-content:flex-start">
          <button class="btn primary" type="submit">Gửi đăng ký</button>
          <a class="btn" href="map.html">Quay lại bản đồ</a>
        </div>
      </form>

      <div id="bookingSuccess" class="success">Đã nhận đăng ký (demo). Nhóm điều phối sẽ liên hệ sớm.</div>
      <div id="bookingError" class="error">Lỗi gửi đăng ký.</div>
    </section>
  </main>

  <script src="js/app.js"></script>
  <script src="js/booking.js"></script>
</body>
</html>

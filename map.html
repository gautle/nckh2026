<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bản đồ trải nghiệm - ArcGIS Embed</title>
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="container top-inner">
      <a class="brand" href="index.html">
        <div class="logo" aria-hidden="true"></div>
        <div>
          <b>Bản đồ trải nghiệm</b>
          <span>Pà Cò - Phú Thọ</span>
        </div>
      </a>
      <nav class="nav">
        <a href="index.html">Trang chủ</a>
        <a class="active" href="map.html">Bản đồ trải nghiệm</a>
        <a href="booking.html">Đặt trải nghiệm</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="map-layout">
      <aside class="card sidebar">
        <h3 style="margin:0">Bộ lọc điểm</h3>
        <div class="search-box">
          <input class="input" id="searchInput" placeholder="Tìm theo tên hoặc mô tả..." />
        </div>

        <div class="filter-box">
          <h5>Loại điểm</h5>
          <label class="check"><input type="checkbox" data-filter-type value="craft" checked /> Nghề</label>
          <label class="check"><input type="checkbox" data-filter-type value="heritage" checked /> Di sản</label>
          <label class="check"><input type="checkbox" data-filter-type value="service" checked /> Dịch vụ</label>
          <label class="check"><input type="checkbox" data-filter-type value="landscape" checked /> Cảnh quan</label>
        </div>

        <div class="filter-box">
          <h5>Quyền ghi hình</h5>
          <label class="check"><input type="checkbox" data-filter-perm value="allowed" checked /> Được</label>
          <label class="check"><input type="checkbox" data-filter-perm value="ask" checked /> Xin phép</label>
          <label class="check"><input type="checkbox" data-filter-perm value="not_allowed" checked /> Không được</label>
        </div>

        <div class="filter-box">
          <h5>Mức nhạy cảm</h5>
          <label class="check"><input type="checkbox" data-filter-sens value="public" checked /> Công khai</label>
          <label class="check"><input type="checkbox" data-filter-sens value="limited" checked /> Giới hạn</label>
          <label class="check"><input type="checkbox" data-filter-sens value="sensitive" checked /> Nhạy cảm</label>
        </div>

        <div class="filter-box">
          <div class="row" style="justify-content:space-between"><h5 style="margin:0">Danh sách điểm</h5><span id="pointCount" class="tag">0 điểm</span></div>
          <div id="pointList" class="point-list"></div>
        </div>
      </aside>

      <section class="card map-box">
        <div class="row" style="padding:10px 10px 0 10px;justify-content:space-between">
          <span class="tag">ArcGIS Web Map</span>
          <a id="btnOpenArcgisFull" class="btn small" href="#" target="_blank" rel="noopener">Mở bản đồ full</a>
        </div>
        <div id="mapHint" class="note" style="padding:0 10px 8px 10px;margin-top:6px">Nhúng ArcGIS đang hoạt động. Bạn có thể kéo/zoom trực tiếp trong khung.</div>
        <div id="map"></div>
      </section>
    </section>
  </main>

  <script>
    // Dán link Embed từ ArcGIS Online (Share -> Embed) vào đây.
    // Ví dụ: https://www.arcgis.com/apps/Embed/index.html?webmap=...
    window.ARCGIS_EMBED_URL = "";
    // (Tuỳ chọn) Link mở full tab, nếu bỏ trống sẽ dùng cùng link embed.
    window.ARCGIS_FULL_URL = "";
  </script>
  <script src="js/config.js"></script>
  <script src="js/demo-data.js"></script>
  <script src="js/metrics.js"></script>
  <script src="js/app.js"></script>
  <script src="js/map.js"></script>
</body>
</html>

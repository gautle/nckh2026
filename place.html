<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hồ sơ điểm</title>
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="container top-inner">
      <a class="brand" href="index.html">
        <div class="logo"></div>
        <div>
          <b>Hồ sơ điểm</b>
          <span>Chi tiết bảo tồn và trải nghiệm</span>
        </div>
      </a>
      <nav class="nav">
        <a href="index.html">Trang chủ</a>
        <a href="map.html">Bản đồ</a>
        <a class="active" href="place.html">Hồ sơ điểm</a>
        <a href="admin-bookings.html">Quản lý đơn</a>
      </nav>
    </div>
  </header>

  <main class="container main">
    <section class="card" style="padding:14px">
      <h1 id="placeName" style="margin:0 0 8px">Đang tải...</h1>
      <div class="badges">
        <span id="placeType" class="tag">-</span>
        <span id="placeCoords" class="tag">-</span>
        <span id="permissionBadge" class="tag">-</span>
        <span id="sensitivityBadge" class="tag">-</span>
      </div>
      <p id="placeSummary" style="color:var(--muted)"></p>
      <p><b>Quy tắc ứng xử:</b> <span id="placeNotes"></span></p>
      <div class="row" style="justify-content:flex-start">
        <a id="btnDirection" class="btn" href="#" target="_blank" rel="noopener">Chỉ đường</a>
        <a id="btnBooking" class="btn primary" href="#">Đặt trải nghiệm</a>
      </div>
    </section>

    <section class="media card">
      <h3 style="margin:0 0 8px">Tư liệu số</h3>
      <div class="media-grid">
        <div>
          <h4 style="margin:0 0 8px">Audio</h4>
          <div id="audioWrap"></div>
        </div>
        <div>
          <h4 style="margin:0 0 8px">Ảnh 360</h4>
          <div id="panoWrap"></div>
        </div>
      </div>
      <div style="margin-top:10px">
        <h4 style="margin:0 0 8px">Ảnh tư liệu</h4>
        <div id="imageWrap"></div>
      </div>
    </section>

    <section class="card" style="padding:12px">
      <h3 style="margin:0 0 8px">Nguồn tư liệu / đồng thuận cộng đồng</h3>
      <p id="sourceNote" style="margin:0;color:var(--muted)">Đang cập nhật...</p>
    </section>
  </main>

  <script src="js/app.js"></script>
  <script src="js/place.js"></script>
</body>
</html>
